version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: crm_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crm_network

  backend:
    image: node:20
    container_name: crm_backend
    working_dir: /app
    restart: always
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: crm
      NODE_ENV: production
    volumes:
      - ../backend:/app
      - /app/node_modules
    command: sh -c "npm install -g @nestjs/cli && npm install && npm run build && node dist/main.js"
    ports:
      - "3000:3000"
    networks:
      - crm_network

  frontend:
    image: node:20
    container_name: crm_frontend
    working_dir: /app
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3000
      NODE_ENV: devepment
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run build && npm start"
    ports:
      - "3001:3000"
    networks:
      - crm_network

volumes:
  postgres_data:

networks:
  crm_network:
    driver: bridge
