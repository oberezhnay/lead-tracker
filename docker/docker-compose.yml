version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: crm_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crm
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - crm_network

  backend:
    image: node:20
    container_name: crm_backend
    working_dir: /app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: crm
      NODE_ENV: development
    volumes:
      - ../backend:/app
      - /app/node_modules
    command: sh -c "npm install --include=dev && npm run start:dev"
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    networks:
      - crm_network

  frontend:
    image: node:20
    container_name: crm_frontend
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      INTERNAL_API_URL: http://backend:3000
      NODE_ENV: development
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: sh -c "npm install --include=dev && npm run dev -- -H 0.0.0.0"
    ports:
      - "3001:3001"
    depends_on:
      - backend
    networks: 
      - crm_network

networks:
  crm_network:
    driver: bridge
